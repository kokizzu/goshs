name: snap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Build snap (${{ matrix.arch }})
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1.3.0
        id: build

      - name: Upload snap artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snap-${{ matrix.arch }}
          path: ${{ steps.build.outputs.snap }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download snap artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: snap-*
          merge-multiple: true

      - name: Resolve snap filenames
        id: snaps
        run: |
          echo "amd64=$(ls goshs_*_amd64.snap)" >> "$GITHUB_OUTPUT"
          echo "arm64=$(ls goshs_*_arm64.snap)" >> "$GITHUB_OUTPUT"

      - name: Publish amd64 to Snap Store
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1.2.0
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snaps.outputs.amd64 }}
          release: stable

      - name: Publish arm64 to Snap Store
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1.2.0
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snaps.outputs.arm64 }}
          release: stable
