name: goreleaser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26
      - name: Install choco shim
        run: |
          sudo install -m755 packaging/choco-linux /usr/local/bin/choco
          choco --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  copr:
    needs: goreleaser
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    steps:
      - name: Trigger COPR build
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          curl -sf --retry 5 --retry-delay 10 --retry-all-errors \
            -X POST \
            --user "${COPR_LOGIN}:${COPR_TOKEN}" \
            -F "ownername=goshs-labs" \
            -F "projectname=goshs" \
            -F "scmtype=git" \
            -F "clone_url=https://github.com/goshs-labs/goshs" \
            -F "committish=${{ github.ref_name }}" \
            -F "spec=packaging/rpm/goshs.spec" \
            -F "srpm_build_method=rpkg" \
            "https://copr.fedorainfracloud.org/api_3/build/create/scm"
