name: goreleaser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # keyless cosign signing of release artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install choco shim
        run: |
          sudo install -m755 packaging/choco-linux /usr/local/bin/choco
          choco --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  copr:
    needs: goreleaser
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    steps:
      - name: Trigger COPR build
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          curl -sf --retry 5 --retry-delay 10 --retry-all-errors \
            -X POST \
            --user "${COPR_LOGIN}:${COPR_TOKEN}" \
            -F "ownername=goshs-labs" \
            -F "projectname=goshs" \
            -F "scmtype=git" \
            -F "clone_url=https://github.com/goshs-labs/goshs" \
            -F "committish=${{ github.ref_name }}" \
            -F "spec=packaging/rpm/goshs.spec" \
            -F "srpm_build_method=rpkg" \
            "https://copr.fedorainfracloud.org/api_3/build/create/scm"
